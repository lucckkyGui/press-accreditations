
<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Event Manager</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      line-height: 1.6;
      color: #333;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      background-color: #f9fafb;
    }
    .container {
      max-width: 500px;
      padding: 2rem;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    h1 {
      margin-top: 0;
      color: #2563eb;
    }
    p {
      margin-bottom: 2rem;
    }
    button {
      background-color: #2563eb;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.25rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📶</div>
    <h1>Brak połączenia z internetem</h1>
    <p>Wygląda na to, że nie masz połączenia z internetem. Część funkcji może nie być dostępna w trybie offline.</p>
    <button onclick="window.location.reload()">Spróbuj ponownie</button>
  </div>
  
  <script>
    // Sprawdź czy połączenie zostało ponownie nawiązane
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
